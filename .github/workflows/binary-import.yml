name: Reconstruct staged binary

on:
  push:
    branches:
      - "asset-import/**"
    paths:
      - ".binary-import/**/READY"

permissions:
  contents: write

concurrency:
  group: binary-import-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reconstruct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out import branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Reconstruct and validate ready binaries
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t ready_files < <(find .binary-import -mindepth 2 -maxdepth 2 -type f -name READY | sort)
          if [ "${#ready_files[@]}" -eq 0 ]; then
            echo "No ready binary imports found" >&2
            exit 1
          fi

          for ready_file in "${ready_files[@]}"; do
            staging_dir="$(dirname "$ready_file")"
            test -f "$staging_dir/manifest.json"
            node scripts/reconstruct-binary-import.mjs "$staging_dir"
          done

      - name: Commit real binary files
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git add -A
          if git diff --cached --quiet; then
            echo "Reconstruction produced no repository changes" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Reconstruct staged binary assets"
          git push origin "HEAD:${GITHUB_REF_NAME}"
