name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare build version
        run: |
          mkdir -p public
          SHORT_SHA="${GITHUB_SHA::7}"
          printf '{\n  "commit": "%s",\n  "short": "%s"\n}\n' "$GITHUB_SHA" "$SHORT_SHA" > public/version.json
          echo "VITE_BUILD_ID=$SHORT_SHA" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    env:
      LIVE_PAGE_URL: https://downlimit.github.io/NestledBurrow/
      LIVE_VERSION_URL: https://downlimit.github.io/NestledBurrow/version.json
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Mark live verification pending
        continue-on-error: true
        run: |
          payload=$(jq -nc \
            --arg state pending \
            --arg context pages/live \
            --arg description "GitHub Pages deployment is being verified" \
            --arg target_url "$LIVE_PAGE_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}')
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data "$payload"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify published commit
        run: |
          for attempt in $(seq 1 36); do
            url="${LIVE_VERSION_URL}?sha=${GITHUB_SHA}&attempt=${attempt}&time=$(date +%s)"
            response=$(curl --fail --silent --show-error --location \
              --header "Cache-Control: no-cache, no-store" \
              --header "Pragma: no-cache" \
              "$url" 2>/dev/null || true)
            published_commit=$(printf '%s' "$response" | jq -r '.commit // empty' 2>/dev/null || true)

            if [ "$published_commit" = "$GITHUB_SHA" ]; then
              echo "Published version matches $GITHUB_SHA"
              echo "Live build verified: ${GITHUB_SHA::7}" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            echo "Attempt $attempt/36: expected $GITHUB_SHA, got ${published_commit:-no valid version.json}"
            sleep 10
          done

          echo "GitHub Pages did not publish $GITHUB_SHA within 6 minutes" >&2
          exit 1

      - name: Mark live verification successful
        if: success()
        continue-on-error: true
        run: |
          payload=$(jq -nc \
            --arg state success \
            --arg context pages/live \
            --arg description "Published version.json matches this commit" \
            --arg target_url "$LIVE_PAGE_URL?v=${GITHUB_SHA::7}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}')
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data "$payload"

      - name: Mark live verification failed
        if: failure()
        continue-on-error: true
        run: |
          payload=$(jq -nc \
            --arg state failure \
            --arg context pages/live \
            --arg description "Published version could not be verified" \
            --arg target_url "$LIVE_VERSION_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}')
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data "$payload"
