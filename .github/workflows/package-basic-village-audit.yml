name: Package Basic Village Audit

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/package-basic-village-audit.yml

permissions:
  contents: read

jobs:
  package-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
      - name: Upload Basic Village review bundle
        uses: actions/upload-artifact@v4
        with:
          name: basic-village-review-bundle
          path: |
            tasks/basic-village/audit
            tasks/basic-village/source/basic/BasicVillageTileset/*.png
            tasks/basic-village/source/godot/BasicVillageTileset/Tileset_Merged.png
            tasks/basic-village/source/godot/TilemapFiles/*.tres
          if-no-files-found: error
          retention-days: 2
