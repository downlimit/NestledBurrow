name: Codex Auto Repair

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: codex-auto-repair-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  repair:
    if: >-
      github.event.review.state == 'commented' &&
      startsWith(github.event.review.user.login, 'chatgpt-codex-connector') &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.review.commit_id == github.event.pull_request.head.sha &&
      !contains(github.event.pull_request.body, '- [x] `strict-risk`') &&
      !contains(github.event.pull_request.body, '- [X] `strict-risk`') &&
      !contains(github.event.pull_request.body, '- [x] strict-risk') &&
      !contains(github.event.pull_request.body, '- [X] strict-risk')
    runs-on: [self-hosted, Windows, X64, codex-repair]
    timeout-minutes: 45

    steps:
      - name: Locate authenticated Codex CLI
        env:
          CODEX_REPAIR_TOKEN: ${{ secrets.CODEX_REPAIR_TOKEN }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CODEX_REPAIR_TOKEN)) {
            throw "Missing Actions secret CODEX_REPAIR_TOKEN"
          }

          $candidates = [System.Collections.Generic.List[string]]::new()
          $command = Get-Command codex -ErrorAction SilentlyContinue
          if ($command -and $command.Source) {
            $candidates.Add($command.Source)
          }
          $candidates.Add((Join-Path $env:USERPROFILE ".local\bin\codex.exe"))
          $candidates.Add((Join-Path $env:USERPROFILE ".local\bin\codex.cmd"))
          $candidates.Add((Join-Path $env:LOCALAPPDATA "Programs\Codex\codex.exe"))
          $candidates.Add((Join-Path $env:APPDATA "npm\codex.cmd"))

          $codex = $candidates |
            Where-Object { $_ -and (Test-Path $_) } |
            Select-Object -Unique -First 1

          if (-not $codex) {
            Write-Host "USERPROFILE=$env:USERPROFILE"
            Write-Host "PATH=$env:PATH"
            throw "Codex CLI was not found for the self-hosted runner user"
          }

          Write-Host "Using Codex CLI: $codex"
          "CODEX_BIN=$codex" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          & $codex -c 'forced_login_method="chatgpt"' login status
          if ($LASTEXITCODE -ne 0) {
            throw "Codex CLI is not authenticated through ChatGPT for the self-hosted runner user"
          }

      - name: Checkout reviewed PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install project dependencies
        shell: pwsh
        run: |
          npm ci
          if ($LASTEXITCODE -ne 0) { throw "npm ci failed" }
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          if ($LASTEXITCODE -ne 0) { throw "Python dependency installation failed" }

      - name: Collect current Codex findings
        id: findings
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("node:fs");
            const path = require("node:path");
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            const data = await github.graphql(`
              query($owner:String!,$repo:String!,$number:Int!){
                repository(owner:$owner,name:$repo){
                  pullRequest(number:$number){
                    reviewThreads(first:100){
                      nodes{
                        id
                        isResolved
                        path
                        line
                        originalLine
                        comments(first:20){nodes{body author{login}}}
                      }
                    }
                  }
                }
              }
            `, { owner, repo, number: pr.number });

            const threads = data.repository.pullRequest.reviewThreads.nodes.filter((thread) =>
              !thread.isResolved && thread.comments.nodes.some((comment) =>
                (comment.author?.login ?? "").startsWith("chatgpt-codex-connector")
              )
            );

            if (threads.length === 0) {
              core.info("No unresolved Codex findings for current head");
              core.setOutput("has_findings", "false");
              return;
            }

            const range = `${pr.base.sha}..${pr.head.sha}`;
            const log = await exec.getExecOutput("git", ["log", "--format=%s", range], { silent: true });
            const repairCount = log.stdout.split(/\r?\n/u).filter((line) => line.startsWith("codex-auto-repair:")).length;
            if (repairCount >= 3) {
              core.setFailed("Automatic repair stopped after three rounds");
              return;
            }

            const findings = threads.map((thread) => {
              const codexComments = thread.comments.nodes.filter((comment) =>
                (comment.author?.login ?? "").startsWith("chatgpt-codex-connector")
              );
              const latest = codexComments.at(-1)?.body ?? "Codex finding was empty.";
              return `### ${thread.path ?? "unknown file"}:${thread.line ?? thread.originalLine ?? "?"}\n${latest}`;
            }).join("\n\n");

            const prompt = `Repair the current pull request in place.\n\nRepository: ${owner}/${repo}\nPull request: #${pr.number} — ${pr.title}\nBase SHA: ${pr.base.sha}\nReviewed head SHA: ${pr.head.sha}\n\nRead AGENTS.md, then inspect only the current PR diff, directly relevant source/tests, and the findings below.\nModify the checked-out PR branch to address every confirmed finding. Keep the original task scope and architecture.\nDo not create a branch, pull request, issue, task file, workflow, or process document.\nDo not commit or push; the workflow handles delivery.\nRun the applicable targeted checks and npm run build. Inspect the final diff.\n\nCurrent unresolved Codex review findings:\n${findings}\n`;

            const temp = process.env.RUNNER_TEMP;
            fs.writeFileSync(path.join(temp, "codex-repair-prompt.md"), prompt, "utf8");
            core.setOutput("has_findings", "true");

      - name: Run Codex repair with ChatGPT subscription
        if: steps.findings.outputs.has_findings == 'true'
        shell: pwsh
        run: |
          $promptPath = Join-Path $env:RUNNER_TEMP "codex-repair-prompt.md"
          $outputPath = Join-Path $env:RUNNER_TEMP "codex-final-message.md"
          Get-Content -Raw $promptPath | & $env:CODEX_BIN -c 'forced_login_method="chatgpt"' exec --full-auto --output-last-message $outputPath -
          if ($LASTEXITCODE -ne 0) { throw "Codex repair failed" }

      - name: Validate repaired checkout
        if: steps.findings.outputs.has_findings == 'true'
        shell: pwsh
        run: |
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw "git diff --check failed" }
          $changes = git status --porcelain
          if ([string]::IsNullOrWhiteSpace(($changes | Out-String))) {
            throw "Codex produced no repair changes"
          }
          npm run check
          if ($LASTEXITCODE -ne 0) { throw "npm run check failed" }

      - name: Commit and push repair to the same PR
        if: steps.findings.outputs.has_findings == 'true'
        env:
          CODEX_REPAIR_TOKEN: ${{ secrets.CODEX_REPAIR_TOKEN }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: pwsh
        run: |
          $remoteLine = git ls-remote --heads origin $env:HEAD_BRANCH
          $remoteHead = if ($remoteLine) { ($remoteLine -split "`t")[0] } else { "" }
          if ($remoteHead -ne $env:HEAD_SHA) {
            throw "PR branch moved from reviewed head $env:HEAD_SHA to $remoteHead; refusing stale repair push"
          }
          git config user.name "OpenAI Codex Auto Repair"
          git config user.email "codex-auto-repair@users.noreply.github.com"
          git add -A
          git commit -m "codex-auto-repair: address review findings for PR #$env:PR_NUMBER"
          if ($LASTEXITCODE -ne 0) { throw "Repair commit failed" }
          $remote = "https://x-access-token:$env:CODEX_REPAIR_TOKEN@github.com/$env:GITHUB_REPOSITORY.git"
          git push $remote "HEAD:$env:HEAD_BRANCH"
          if ($LASTEXITCODE -ne 0) { throw "Repair push failed" }
