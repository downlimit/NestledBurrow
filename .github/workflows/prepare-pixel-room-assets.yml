name: Prepare Pixel Room Task Assets

on:
  push:
    branches:
      - task/pixel-room-assets
    paths:
      - .github/workflows/prepare-pixel-room-assets.yml

permissions:
  contents: write

jobs:
  prepare-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout task branch
        uses: actions/checkout@v6
        with:
          ref: task/pixel-room-assets
          fetch-depth: 0

      - name: Download and validate official Kenney archives
        shell: bash
        run: |
          set -euo pipefail

          target="tasks/pixel-room/source"
          mkdir -p "$target"

          urban_url="https://kenney.nl/media/pages/assets/rpg-urban-pack/0a097d1dc7-1677578575/kenney_rpg-urban-pack.zip"
          room_url="https://kenney.nl/media/pages/assets/roguelike-rpg-pack/12c03cd78b-1677697420/kenney_roguelike-rpg-pack.zip"

          curl --fail --location --retry 4 --retry-all-errors \
            "$urban_url" \
            --output "$target/kenney_rpg-urban-pack.zip"

          curl --fail --location --retry 4 --retry-all-errors \
            "$room_url" \
            --output "$target/kenney_roguelike-rpg-pack.zip"

          test -s "$target/kenney_rpg-urban-pack.zip"
          test -s "$target/kenney_roguelike-rpg-pack.zip"

          unzip -tq "$target/kenney_rpg-urban-pack.zip"
          unzip -tq "$target/kenney_roguelike-rpg-pack.zip"

          (
            cd "$target"
            sha256sum kenney_rpg-urban-pack.zip kenney_roguelike-rpg-pack.zip > SHA256SUMS
          )

          cat > "$target/README.md" <<'EOF'
          # Временные исходные ассеты задачи pixel-room

          Эти архивы автоматически загружены с официального сайта Kenney и нужны только для выполнения `../TASK.md`.

          ## Архивы

          - `kenney_rpg-urban-pack.zip`
            - Источник: https://kenney.nl/assets/rpg-urban-pack
            - Автор: Kenney
            - Лицензия: CC0 1.0 Universal
            - Назначение: выбрать одного маленького человека с четырьмя направлениями ходьбы.

          - `kenney_roguelike-rpg-pack.zip`
            - Источник: https://kenney.nl/assets/roguelike-rpg-pack
            - Автор: Kenney
            - Лицензия: CC0 1.0 Universal
            - Назначение: выбрать деревянный пол, четыре стороны стен и четыре угла комнаты.

          Контрольные суммы находятся в `SHA256SUMS`.

          После интеграции выбранных PNG весь каталог `tasks/pixel-room/`, включая эти полные архивы, должен быть удалён из итоговой ветки Codex.
          EOF

      - name: Remove one-off workflow
        run: rm .github/workflows/prepare-pixel-room-assets.yml

      - name: Commit prepared task bundle
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tasks/pixel-room .github/workflows/prepare-pixel-room-assets.yml
          git commit -m "Add Kenney source archives for pixel room task"
          git push origin HEAD:task/pixel-room-assets
