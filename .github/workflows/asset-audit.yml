name: Kenney Asset Audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    name: Build contact sheets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Audit original Kenney archive
        run: python scripts/audit-kenney-room-pack.py

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: kenney-room-pack-audit
          path: audit-output/
          if-no-files-found: error
          retention-days: 3
