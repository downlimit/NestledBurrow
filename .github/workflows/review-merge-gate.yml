name: Review Merge Gate

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, edited]
  pull_request_review:
    types: [submitted, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  workflow_run:
    workflows: [Pull Request Check]
    types: [completed]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  actions: read
  checks: read
  contents: write
  pull-requests: write

concurrency:
  group: review-merge-gate
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted main policy
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Evaluate open pull requests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/run-review-merge-gate.mjs
