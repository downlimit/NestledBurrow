name: Prepare Basic Village Assets

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/prepare-basic-village-assets.yml
  push:
    branches:
      - feature/basic-village-tileset
    paths:
      - .github/workflows/prepare-basic-village-assets.yml

permissions:
  contents: write

jobs:
  prepare-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/basic-village-tileset
          fetch-depth: 0

      - name: Install browser downloader
        run: |
          python -m pip install --disable-pip-version-check playwright==1.55.0
          python -m playwright install chromium

      - name: Download official Forchild archives
        shell: bash
        run: |
          set -euo pipefail
          target="tasks/basic-village/source"
          rm -rf "$target" tasks/basic-village/diagnostic
          mkdir -p "$target/basic" "$target/godot"

          python - <<'PY'
          from pathlib import Path
          from playwright.sync_api import sync_playwright

          page_url = "https://forchild.itch.io/village-tileset"
          uploads = {
              "4644644": "BasicVillageTileset.zip",
              "4659743": "GodotTilemapImport.zip",
          }
          target = Path("tasks/basic-village/source")

          with sync_playwright() as playwright:
              browser = playwright.chromium.launch(headless=True)
              page = browser.new_page(accept_downloads=True)
              page.goto(page_url, wait_until="domcontentloaded", timeout=120_000)

              for upload_id, filename in uploads.items():
                  selector = f'a.download_btn[data-upload_id="{upload_id}"]'
                  page.locator(selector).wait_for(state="visible", timeout=60_000)
                  with page.expect_download(timeout=120_000) as download_info:
                      page.locator(selector).click()
                  download = download_info.value
                  destination = target / filename
                  download.save_as(destination)
                  data = destination.read_bytes()
                  if not data.startswith(b"PK"):
                      raise RuntimeError(
                          f"{filename} is not a ZIP archive; suggested={download.suggested_filename}; first bytes={data[:80]!r}"
                      )
                  print(f"downloaded {filename}: {len(data)} bytes")

              browser.close()
          PY

          unzip -tq "$target/BasicVillageTileset.zip"
          unzip -tq "$target/GodotTilemapImport.zip"
          unzip -oq "$target/BasicVillageTileset.zip" -d "$target/basic"
          unzip -oq "$target/GodotTilemapImport.zip" -d "$target/godot"

          (
            cd "$target"
            sha256sum BasicVillageTileset.zip GodotTilemapImport.zip > SHA256SUMS
          )

          find "$target" -maxdepth 6 -type f -print | sort

      - name: Add source note and remove one-off workflow
        shell: bash
        run: |
          cat > tasks/basic-village/source/README.md <<'EOF'
          # Temporary Basic Village integration source

          - Official source: https://forchild.itch.io/village-tileset
          - Author: Forchild
          - License: CC0
          - Tile grid: 16x16
          - Official uploads: `BasicVillageTileset.zip` and `GodotTilemapImport.zip`

          These archives and extracted files are temporary integration inputs. Keep only production assets and canonical audit information after the migration is complete.
          EOF
          rm .github/workflows/prepare-basic-village-assets.yml

      - name: Commit prepared source bundle
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tasks/basic-village .github/workflows/prepare-basic-village-assets.yml
          git commit -m "Prepare Basic Village source assets"
          git push origin HEAD:feature/basic-village-tileset
