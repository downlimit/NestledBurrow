name: Prepare Basic Village Assets

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/prepare-basic-village-assets.yml
  push:
    branches:
      - feature/basic-village-tileset
    paths:
      - .github/workflows/prepare-basic-village-assets.yml

permissions:
  contents: write

jobs:
  prepare-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/basic-village-tileset
          fetch-depth: 0

      - name: Capture official itch page and upload metadata
        shell: bash
        run: |
          set -euo pipefail
          target="tasks/basic-village/diagnostic"
          mkdir -p "$target"
          curl --fail --location --retry 4 --retry-all-errors \
            -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36" \
            "https://forchild.itch.io/village-tileset" \
            -o "$target/itch-page.html"

          python - <<'PY'
          from pathlib import Path
          import html
          import re

          path = Path("tasks/basic-village/diagnostic/itch-page.html")
          source = path.read_text(encoding="utf-8", errors="replace")
          report = []
          report.append(f"page_length={len(source)}")
          report.append("upload_ids=" + ",".join(re.findall(r'data-upload_id=[\"\'](\d+)[\"\']', source)))
          report.append("file_links=")
          for href in re.findall(r'href=[\"\']([^\"\']*/file/\d+[^\"\']*)[\"\']', source):
              report.append(html.unescape(href))
          for filename in ("BasicVillageTileset.zip", "GodotTilemapImport.zip"):
              pos = source.find(filename)
              report.append(f"\n===== {filename} position={pos} =====")
              if pos >= 0:
                  report.append(source[max(0, pos - 3000):pos + 1500])
          Path("tasks/basic-village/diagnostic/report.txt").write_text("\n".join(report), encoding="utf-8")
          print("\n".join(report[:4]))
          PY

      - name: Commit diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tasks/basic-village/diagnostic
          git commit -m "Capture Basic Village download metadata"
          git push origin HEAD:feature/basic-village-tileset
