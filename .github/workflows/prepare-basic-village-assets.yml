name: Prepare Basic Village Assets

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/prepare-basic-village-assets.yml
  push:
    branches:
      - feature/basic-village-tileset
    paths:
      - .github/workflows/prepare-basic-village-assets.yml

permissions:
  contents: write

jobs:
  prepare-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/basic-village-tileset
          fetch-depth: 0

      - name: Install browser inspector
        run: |
          python -m pip install --disable-pip-version-check playwright==1.55.0
          python -m playwright install chromium

      - name: Inspect official download interaction
        shell: bash
        run: |
          set -euo pipefail
          rm -rf tasks/basic-village/browser-diagnostic
          mkdir -p tasks/basic-village/browser-diagnostic

          python - <<'PY'
          from pathlib import Path
          import json
          import traceback
          from playwright.sync_api import sync_playwright

          target = Path("tasks/basic-village/browser-diagnostic")
          events = []

          with sync_playwright() as playwright:
              browser = playwright.chromium.launch(headless=True)
              page = browser.new_page(accept_downloads=True)
              page.on("request", lambda request: events.append({
                  "kind": "request",
                  "method": request.method,
                  "url": request.url,
                  "post_data": request.post_data,
                  "headers": request.headers,
              }))
              page.on("response", lambda response: events.append({
                  "kind": "response",
                  "status": response.status,
                  "url": response.url,
                  "headers": response.headers,
              }))
              page.on("download", lambda download: events.append({
                  "kind": "download",
                  "url": download.url,
                  "suggested_filename": download.suggested_filename,
              }))
              page.on("popup", lambda popup: events.append({"kind": "popup", "url": popup.url}))
              page.on("console", lambda message: events.append({"kind": "console", "type": message.type, "text": message.text}))

              try:
                  page.goto("https://forchild.itch.io/village-tileset", wait_until="networkidle", timeout=120_000)
                  selector = 'a.download_btn[data-upload_id="4644644"]'
                  locator = page.locator(selector)
                  locator.wait_for(state="visible", timeout=60_000)
                  events.append({
                      "kind": "element",
                      "outer_html": locator.evaluate("element => element.outerHTML"),
                      "href": locator.get_attribute("href"),
                  })
                  locator.click(timeout=30_000)
                  page.wait_for_timeout(10_000)
              except Exception:
                  events.append({"kind": "exception", "traceback": traceback.format_exc()})

              events.append({"kind": "final", "url": page.url, "title": page.title()})
              page.screenshot(path=target / "after-click.png", full_page=True)
              (target / "page-after-click.html").write_text(page.content(), encoding="utf-8")
              browser.close()

          (target / "events.json").write_text(json.dumps(events, indent=2), encoding="utf-8")
          print(json.dumps(events[-12:], indent=2))
          PY

      - name: Commit browser diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tasks/basic-village/browser-diagnostic
          git commit -m "Inspect Basic Village browser download flow"
          git push origin HEAD:feature/basic-village-tileset
