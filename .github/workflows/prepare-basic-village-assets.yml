name: Prepare Basic Village Assets

on:
  push:
    branches:
      - feature/basic-village-tileset
    paths:
      - .github/workflows/prepare-basic-village-assets.yml

permissions:
  contents: write

jobs:
  prepare-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/basic-village-tileset
          fetch-depth: 0

      - name: Download official Forchild archives
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import html
          import http.cookiejar
          import re
          import urllib.parse
          import urllib.request
          from pathlib import Path

          PAGE = "https://forchild.itch.io/village-tileset"
          FILES = ["BasicVillageTileset.zip", "GodotTilemapImport.zip"]
          TARGET = Path("tasks/basic-village/source")
          TARGET.mkdir(parents=True, exist_ok=True)

          cookies = http.cookiejar.CookieJar()
          opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(cookies))
          headers = {
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/zip,*/*",
          }

          page_request = urllib.request.Request(PAGE, headers=headers)
          page = opener.open(page_request, timeout=60).read().decode("utf-8", errors="replace")
          (TARGET / "itch-page.html").write_text(page, encoding="utf-8")

          for filename in FILES:
              position = page.find(filename)
              if position < 0:
                  raise RuntimeError(f"Could not find {filename} on official page")

              before = page[max(0, position - 8000):position]
              around = page[max(0, position - 8000):position + 4000]

              href_matches = re.findall(r'href=["\']([^"\']*/file/\d+[^"\']*)["\']', around)
              href = href_matches[-1] if href_matches else None

              upload_matches = re.findall(r'data-upload_id=["\'](\d+)["\']', before)
              upload_id = upload_matches[-1] if upload_matches else None

              if href:
                  download_url = urllib.parse.urljoin(PAGE, html.unescape(href))
              elif upload_id:
                  download_url = f"{PAGE}/file/{upload_id}"
              else:
                  diagnostic = TARGET / f"{filename}.context.html"
                  diagnostic.write_text(around, encoding="utf-8")
                  raise RuntimeError(f"Could not resolve upload link for {filename}")

              request = urllib.request.Request(
                  download_url,
                  headers={**headers, "Referer": PAGE},
              )
              data = opener.open(request, timeout=120).read()
              if not data.startswith(b"PK"):
                  (TARGET / f"{filename}.download-response").write_bytes(data)
                  raise RuntimeError(
                      f"Official download for {filename} did not return a ZIP; URL={download_url}"
                  )

              destination = TARGET / filename
              destination.write_bytes(data)
              print(f"downloaded {filename}: {len(data)} bytes from {download_url}")
          PY

          unzip -tq tasks/basic-village/source/BasicVillageTileset.zip
          unzip -tq tasks/basic-village/source/GodotTilemapImport.zip
          mkdir -p tasks/basic-village/source/basic tasks/basic-village/source/godot
          unzip -oq tasks/basic-village/source/BasicVillageTileset.zip -d tasks/basic-village/source/basic
          unzip -oq tasks/basic-village/source/GodotTilemapImport.zip -d tasks/basic-village/source/godot
          find tasks/basic-village/source -maxdepth 5 -type f -print | sort
          (
            cd tasks/basic-village/source
            sha256sum BasicVillageTileset.zip GodotTilemapImport.zip > SHA256SUMS
          )

      - name: Add source note and remove one-off workflow
        shell: bash
        run: |
          cat > tasks/basic-village/source/README.md <<'EOF'
          # Temporary Basic Village integration source

          Official source: https://forchild.itch.io/village-tileset
          Author: Forchild
          License: CC0
          Tile grid: 16x16

          These archives and extracted files are temporary integration inputs. Keep only the production files and canonical audit information after the migration is complete.
          EOF
          rm .github/workflows/prepare-basic-village-assets.yml

      - name: Commit prepared source bundle
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tasks/basic-village .github/workflows/prepare-basic-village-assets.yml
          git commit -m "Prepare Basic Village source assets"
          git push origin HEAD:feature/basic-village-tileset
