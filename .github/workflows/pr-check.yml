name: Pull Request Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Capture npm ci diagnostics
        run: |
          mkdir -p artifacts/npm-ci
          set +e
          npm ci > artifacts/npm-ci/npm-ci.log 2>&1
          status=$?
          cat artifacts/npm-ci/npm-ci.log
          echo "exit_code=$status" > artifacts/npm-ci/status.txt
          exit $status

      - name: Upload npm ci diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-ci-diagnostics-pr-${{ github.event.pull_request.number }}
          path: artifacts/npm-ci
          if-no-files-found: error
          retention-days: 7
