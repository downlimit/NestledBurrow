name: Pull Request Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install visual check dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Run project checks
        run: npm run check

      - name: Upload world previews
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-previews-pr-${{ github.event.pull_request.number }}
          path: |
            artifacts/world-overview.png
            artifacts/camera-indoor.png
            artifacts/camera-outdoor.png
            artifacts/top-wall-detail.png
          if-no-files-found: warn
          retention-days: 7
