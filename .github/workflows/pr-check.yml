name: Pull Request Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Check input
        run: npm run check:input

      - name: Check visual configuration
        run: npm run check:visual

      - name: Check world and collision
        run: npm run check:world

      - name: Build production bundle
        run: npm run build
