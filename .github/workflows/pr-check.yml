name: Pull Request Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  issues: write

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install visual check dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Run project checks
        run: npm run check

      - name: Test whether Actions bot triggers Codex
        if: github.event.pull_request.number == 87
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -d '{"body":"@codex address the remaining unresolved review feedback in this existing PR, push fixes to the same branch, and do not create another PR. Automated trigger capability test: NB-CODEX-BOT-TRIGGER-1"}'

      - name: Upload world previews
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-previews-pr-${{ github.event.pull_request.number }}
          path: |
            artifacts/world-overview.png
            artifacts/camera-indoor.png
            artifacts/camera-outdoor.png
            artifacts/top-wall-detail.png
            artifacts/character-diagonal-contact-sheet.png
          if-no-files-found: warn
          retention-days: 7

  browser:
    name: Browser E2E
    needs: build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser checks
        run: npm run check:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: artifacts/playwright-report
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-pr-${{ github.event.pull_request.number }}
          path: test-results
          if-no-files-found: warn
          retention-days: 7