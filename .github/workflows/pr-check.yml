name: Pull Request Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Diagnose Fan-in Checks
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Capture full project check
        run: |
          mkdir -p artifacts/fanin-diagnostics
          set +e
          npm run check > artifacts/fanin-diagnostics/npm-check.log 2>&1
          status=$?
          cat artifacts/fanin-diagnostics/npm-check.log
          echo "exit_code=$status" > artifacts/fanin-diagnostics/status.txt
          exit $status

      - name: Upload check diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanin-check-diagnostics-pr-${{ github.event.pull_request.number }}
          path: artifacts/fanin-diagnostics
          if-no-files-found: error
          retention-days: 7
