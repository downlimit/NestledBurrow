name: Pull Request Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Materialize localization repair
        run: |
          npm install --package-lock-only --ignore-scripts
          mkdir -p public/assets/fonts/rubik
          curl --fail --location --retry 3 https://raw.githubusercontent.com/googlefonts/rubik/main/old/version-2/fonts/ttf/Rubik-Regular.ttf --output public/assets/fonts/rubik/Rubik-Regular.ttf
          curl --fail --location --retry 3 https://raw.githubusercontent.com/googlefonts/rubik/main/OFL.txt --output public/assets/fonts/rubik/OFL.txt
          python -m pip install --disable-pip-version-check fonttools
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          from fontTools.ttLib import TTFont

          font_path = Path("public/assets/fonts/rubik/Rubik-Regular.ttf")
          font = TTFont(font_path)
          codepoints = set()
          for table in font["cmap"].tables:
              codepoints.update(table.cmap)
          required = "AaZzАаЯяЁё"
          missing = [character for character in required if ord(character) not in codepoints]
          if missing:
              raise SystemExit(f"Rubik glyph validation failed: {missing}")
          expected = "a66d53c66f8e31520c9b6212eae9e1c6bdd59e01eab2f2068ddd1f80f062c235"
          digest = hashlib.sha256(font_path.read_bytes()).hexdigest()
          if digest != expected:
              raise SystemExit(f"Unexpected Rubik SHA-256: {digest}")

          for locale in ("en", "ru"):
              path = Path(f"public/locales/{locale}/hud.json")
              data = json.loads(path.read_text(encoding="utf-8"))
              data["language"]["currentNext"] = "{current} / {next}"
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          check = Path("scripts/check-localization.mjs")
          source = check.read_text(encoding="utf-8")
          if 'import { createHash } from "node:crypto";' not in source:
              source = source.replace('import assert from "node:assert/strict";\n', 'import assert from "node:assert/strict";\nimport { createHash } from "node:crypto";\n')
          source = source.replace('import { readFileSync, readdirSync } from "node:fs";', 'import { existsSync, readFileSync, readdirSync } from "node:fs";')
          marker = 'console.log("localization checks passed");'
          if 'const rubikFontPath' not in source:
              guard_lines = [
                  'const rubikFontPath = "public/assets/fonts/rubik/Rubik-Regular.ttf";',
                  'const rubikLicensePath = "public/assets/fonts/rubik/OFL.txt";',
                  'assert(existsSync(rubikFontPath), "Rubik runtime font is committed");',
                  'assert(existsSync(rubikLicensePath), "Rubik OFL license is committed beside the font");',
                  'assert.equal(',
                  '  createHash("sha256").update(readFileSync(rubikFontPath)).digest("hex"),',
                  '  "a66d53c66f8e31520c9b6212eae9e1c6bdd59e01eab2f2068ddd1f80f062c235",',
                  '  "Rubik runtime font hash matches the validated asset",',
                  ');',
                  'for (const locale of SUPPORTED_LOCALES) {',
                  '  const hud = read(locale, "hud");',
                  '  assert.equal(hud.language.currentNext, "{current} / {next}", `${locale} language label uses ICU placeholders`);',
                  '  assert(!hud.language.currentNext.includes("{{"), `${locale} language label does not use disabled i18next interpolation`);',
                  '}',
              ]
              source = source.replace(marker, "\n".join(guard_lines) + "\n\n" + marker)
          check.write_text(source, encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json scripts/check-localization.mjs public/locales/en/hud.json public/locales/ru/hud.json public/assets/fonts/rubik
          git commit -m "Repair localization dependencies and bundled font"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install visual check dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Run project checks
        run: npm run check

      - name: Upload world previews
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-previews-pr-${{ github.event.pull_request.number }}
          path: |
            artifacts/world-overview.png
            artifacts/camera-indoor.png
            artifacts/camera-outdoor.png
            artifacts/top-wall-detail.png
          if-no-files-found: warn
          retention-days: 7
