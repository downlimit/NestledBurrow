name: Pull Request Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  import-sunlit-save-point:
    name: Import verified Sunlit attachment
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'asset-import/sunlit-save-point'
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout exact asset branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and validate exact attachment bytes
        shell: bash
        run: |
          set -euo pipefail
          source_url="https://cdn1.suno.ai/61639bec-b15a-4926-bb3e-6834e72db917.mp3"
          target="public/assets/audio/music/sunlit-save-point.mp3"
          temp_file="$(mktemp)"
          trap 'rm -f "$temp_file"' EXIT

          curl --fail --location --retry 3 --retry-all-errors "$source_url" --output "$temp_file"
          test "$(stat -c '%s' "$temp_file")" = "3977087"
          echo "502dfd51bcfa7908becd39f604a6c73d868d9742fd3d1207c985cb9482627a91  $temp_file" | sha256sum --check --strict
          file "$temp_file" | grep -qiE 'MPEG|Audio'

          mkdir -p "$(dirname "$target")"
          mv "$temp_file" "$target"
          rm -rf .binary-import

      - name: Commit verified MP3 to asset branch
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Import Sunlit Save Point music"
          git push origin "HEAD:${GITHUB_HEAD_REF}"

  build:
    name: Validate
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install visual check dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Run project checks
        run: npm run check

      - name: Upload world previews
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-previews-pr-${{ github.event.pull_request.number }}
          path: |
            artifacts/world-overview.png
            artifacts/camera-indoor.png
            artifacts/camera-outdoor.png
            artifacts/top-wall-detail.png
            artifacts/character-diagonal-contact-sheet.png
          if-no-files-found: warn
          retention-days: 7

  browser:
    name: Browser E2E
    needs: build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser checks
        run: npm run check:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: artifacts/playwright-report
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-pr-${{ github.event.pull_request.number }}
          path: test-results
          if-no-files-found: warn
          retention-days: 7
