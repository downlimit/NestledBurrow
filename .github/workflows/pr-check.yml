name: Pull Request Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Regenerate lockfile from package manifest
        run: |
          rm -f package-lock.json
          npm install --package-lock-only --ignore-scripts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Regenerate localization dependency lockfile"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install visual check dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Run project checks
        run: npm run check

      - name: Upload world previews
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-previews-pr-${{ github.event.pull_request.number }}
          path: |
            artifacts/world-overview.png
            artifacts/camera-indoor.png
            artifacts/camera-outdoor.png
            artifacts/top-wall-detail.png
          if-no-files-found: warn
          retention-days: 7
