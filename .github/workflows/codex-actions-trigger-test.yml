name: Codex Actions Trigger Test

on:
  push:
    branches: [main]
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  trigger:
    if: github.event_name == 'push' || (github.event.issue.pull_request != null && github.event.issue.number == 87 && contains(github.event.comment.body, 'NB-CODEX-ACTIONS-TRIGGER-TEST'))
    runs-on: ubuntu-latest
    steps:
      - name: Ask Codex from GitHub Actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment 87 --repo "$GITHUB_REPOSITORY" --body '@codex address the remaining unresolved review feedback in this existing PR, push fixes to the same branch, and do not create another PR. Automated GitHub Actions trigger test: NB-CODEX-ACTIONS-BOT-COMMENT'