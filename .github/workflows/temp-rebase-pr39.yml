name: Temporary Rebase PR39

on:
  push:
    branches:
      - "codex/-character-npc"

permissions:
  contents: write

jobs:
  rebase-pr:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge current main and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          if ! git merge --no-edit origin/main; then
            unresolved="$(git diff --name-only --diff-filter=U)"
            allowed=$'LIBRARY.md\nPROJECT.md\npackage.json'
            unexpected="$(comm -23 <(printf '%s\n' "$unresolved" | sort) <(printf '%s\n' "$allowed" | sort))"
            if [[ -n "$unexpected" ]]; then
              echo "Unexpected merge conflicts:"
              printf '%s\n' "$unexpected"
              exit 1
            fi
            git checkout --ours -- LIBRARY.md PROJECT.md package.json
            git add LIBRARY.md PROJECT.md package.json
            git commit --no-edit
          fi

          git rm .github/workflows/temp-rebase-pr39.yml
          git commit --amend --no-edit
          git push origin HEAD:"codex/-character-npc"
